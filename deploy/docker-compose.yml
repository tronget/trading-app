name: trading-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: trading-clickhouse
    environment:
      CLICKHOUSE_USER: trading
      CLICKHOUSE_PASSWORD: trading
      CLICKHOUSE_DB: trading
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    volumes:
      - chdata:/var/lib/clickhouse
      - ./init/clickhouse:/docker-entrypoint-initdb.d:ro,z
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: trading-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: trading-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro,z
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      jaeger:
        condition: service_started

  quotes:
    build: ../quotes-go
    container_name: trading-quotes
    environment:
      QUOTES_REDIS_ADDR: redis:6379
      QUOTES_CLICKHOUSE_ADDR: http://trading:trading@clickhouse:8123/trading
      QUOTES_SYMBOLS: "0:SBER,1:GAZP,2:AAPL,3:BTC"
      QUOTES_SIMULATE: "1"   # на macOS нет /dev/stock* — встроенный GBM-симулятор
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/quotes", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5

  data-service:
    build: ../data-service-ktor
    container_name: trading-data
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/trading
      DB_USER: trading
      DB_PASSWORD: trading
      REDIS_ADDR: redis
      REDIS_PORT: "6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: data-service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build: ../gateway-ktor
    container_name: trading-gateway
    environment:
      DATA_SERVICE_URL: http://data-service:8082
      REDIS_ADDR: redis
      REDIS_PORT: "6379"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: trading
      CLICKHOUSE_PASSWORD: trading
      CLICKHOUSE_DB: trading
      JWT_SECRET: dev-secret-change-me
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: gateway
    ports:
      - "8080:8080"
    depends_on:
      data-service:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  pgdata:
  chdata:
